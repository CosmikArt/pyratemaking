site_name: pyratemaking
site_description: Pure-Python ratemaking for P&C insurance — end to end.
site_url: https://cosmikart.github.io/pyratemaking
repo_url: https://github.com/CosmikArt/pyratemaking
repo_name: CosmikArt/pyratemaking

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.code.annotate
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_root_heading: true
            show_source: false
            members_order: source
            docstring_section_style: list
            heading_level: 3

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - footnotes
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - User guide:
      - Rate level indication: guide/indication.md
      - On-leveling: guide/onleveling.md
      - Trending: guide/trending.md
      - Loss development: guide/development.md
      - Classification: guide/classification.md
      - Large loss: guide/large-loss.md
      - Implementation: guide/implementation.md
  - API reference:
      - RatePlan: reference/rateplan.md
      - GLM: reference/glm.md
      - Modules: reference/modules.md
